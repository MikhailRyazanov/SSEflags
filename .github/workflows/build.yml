name: Build sdist and wheels

on: workflow_dispatch

env:
  FORCE_COLOR: 1
  PIP_PROGRESS_BAR: 'off'

jobs:
  noarch:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '>=3.10'
    - name: Update setup, install build
      run: python -m pip install --upgrade pip setuptools build
    - name: Create source distribution
      run: python -m build --sdist
    - name: Create universal wheel (no Cython)
      run: sseflags=none python -m build --wheel
    - name: Test universal wheel
      run: |
        python -m pip install numpy
        python -m pip install dist/*.whl
        cd ..
        python -m sseflags.benchmark
    - uses: actions/upload-artifact@v6
      with:
        name: noarch(${{ github.ref_name }})
        path: ./dist/*

  wheels:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-26-intel, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '>=3.10' # for cibuildwheel itself
    - name: Install cibuildwheel
      run: python -m pip install cibuildwheel
    - name: Build wheels
      env:
        CIBW_PROJECT_REQUIRES_PYTHON: '==3.10.*'
      run: python -m cibuildwheel --output-dir wheels
    - uses: actions/upload-artifact@v6
      with:
        name: wheels(${{ github.ref_name }})${{ matrix.os }}
        path: ./wheels/*
